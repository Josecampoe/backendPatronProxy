spring.application.name=backend
server.port=${PORT:8080}

# Database
spring.datasource.url=${DATASOURCE_URL:jdbc:h2:mem:aiproxy}
spring.datasource.driver-class-name=${DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${DATASOURCE_USERNAME:sa}
spring.datasource.password=${DATASOURCE_PASSWORD:}
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# Mock AI service
mock.ai.latency-ms=${MOCK_AI_LATENCY_MS:1200}

# Rate limit
rate.limit.window-ms=${RATE_LIMIT_WINDOW_MS:60000}

# Scheduler
scheduler.rate-limit-reset-ms=${SCHEDULER_RATE_LIMIT_RESET_MS:60000}
